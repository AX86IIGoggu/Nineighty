    <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nineighty</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: #e5e7eb;
    text-align: center;
    padding: 40px;
}

.container {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 0 40px rgba(80,120,255,0.15);
    max-width: 600px;
    margin: auto;
}

h1 {
    font-weight: 600;
    letter-spacing: 2px;
}

.subtitle {
    color: #94a3b8;
    font-size: 14px;
    margin-bottom: 20px;
}

textarea {
    width: 100%;
    height: 120px;
    border-radius: 12px;
    border: none;
    padding: 12px;
    margin-top: 10px;
    background: #020617;
    color: #e5e7eb;
    outline: none;
}

button {
    margin: 10px;
    padding: 10px 18px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #3b82f6, #6366f1);
    color: white;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px rgba(99,102,241,0.6);
}

.output {
    margin-top: 20px;
    padding: 12px;
    background: #020617;
    border-radius: 12px;
    word-break: break-all;
    font-size: 13px;
    border: 1px solid rgba(255,255,255,0.05);
}

.copy-btn {
    background: linear-gradient(135deg, #10b981, #22c55e);
}

.copy-btn:hover {
    box-shadow: 0 0 15px rgba(34,197,94,0.6);
}

.glow {
    color: #60a5fa;
    text-shadow: 0 0 10px rgba(96,165,250,0.8);
}
</style>
</head>
<body>

<div class="container">
    <h1 class="glow">⚡ Nineighty</h1>
    <div class="subtitle">Encode. Decode. Stay hidden.</div>

    <textarea id="input" placeholder="Type or paste anything..."></textarea>

    <div>
        <button onclick="encode()">Encode</button>
        <button onclick="decode()">Decode</button>
    </div>

    <div class="output" id="output"></div>

    <button class="copy-btn" onclick="copyText()">Copy</button>
</div>

<script>
function encode() {
    let text = document.getElementById("input").value;
    let result = [];

    for (let i = 0; i < text.length; i++) {
        let num = text.charCodeAt(i);
        let binary = num.toString(2).padStart(16, '0');
        let nineighty = binary.replace(/0/g, '8').replace(/1/g, '9');
        result.push(nineighty);
    }

    document.getElementById("output").innerText = result.join("|");
}

function decode() {
    let text = document.getElementById("input").value.split("|");
    let result = "";

    for (let code of text) {
        if (code.trim() === "") continue;
        let binary = code.replace(/8/g, '0').replace(/9/g, '1');
        let num = parseInt(binary, 2);
        result += String.fromCharCode(num);
    }

    document.getElementById("output").innerText = result;
}

function copyText() {
    let text = document.getElementById("output").innerText;
    navigator.clipboard.writeText(text);
}
</script>

</body> 
</html>
    <script src="/script.js"></script>
  </body>

</html>
